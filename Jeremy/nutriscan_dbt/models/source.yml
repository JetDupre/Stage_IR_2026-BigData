version: 2

sources:
     - name: nutriscan
       meta:
         external_location: "read_parquet('C:/data/nutriScan/sources/food.parquet')"
       tables:
         - name: food
           description: 'Fichier brut Open Food Facts - 4,5 millions de produits alimentaires'
           columns:
             - name: code
               description: 'Code EAN-13 du produit'
